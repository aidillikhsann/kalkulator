<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>kalkulator</title>
  </head>
  <body>
    <div class="kalkulator">
      <div class="container">
        <div class="layar">
          <!-- layar untuk kalkulator -->
          <p id="hasil"></p>
          <p id="layar"></p>
        </div>
        <div class="tombol">
          <table>
            <tr>
              <td class="operator">CE</td>
              <td class="hapusAll">C</td>
              <td class="hapus">↩</td>
              <td class="operator">⁒</td>
            </tr>
            <tr>
              <td class="angka">7</td>
              <td class="angka">8</td>
              <td class="angka">9</td>
              <td class="operator">x</td>
            </tr>
            <tr>
              <td class="angka">4</td>
              <td class="angka">5</td>
              <td class="angka">6</td>
              <td class="operator">-</td>
            </tr>
            <tr>
              <td class="angka">1</td>
              <td class="angka">2</td>
              <td class="angka">3</td>
              <td class="operator">+</td>
            </tr>
            <tr>
              <td class="min">±</td>
              <td class="angka">0</td>
              <td class="koma">,</td>
              <td style="background-color: blueviolet" class="samadengan">=</td>
            </tr>
          </table>
        </div>
      </div>
      <div class="hytori">
        <p>Hytori</p>
        <ul>
          <li></li>
        </ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
